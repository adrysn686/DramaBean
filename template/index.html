<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DramaBean</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,400;1,300&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
    <style>

    </style>
</head>
<body>
    <div class="chat-header">
        <div class="header-text">
            <h1>DramaBean</h1>
            <p>cdrama companion</p>
        </div>
        <div class="header-right">
            <span class="header-cn">戏豆</span>
            <div class="online-dot"></div>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="welcome" id="welcome">
            <div class="welcome-cn">戏 · 豆 · DRAMABEAN</div>
            <div class="divider"></div>
            <div class="welcome-title">your cdrama companion</div>
            <p>ask me for recommendations, cast details, or where to find your next obsession</p>
            <div class="suggestions">
                <div class="suggestion-chip" onclick="quickSend('recommend me something to watch tonight')">recommend something ✦</div>
                <div class="suggestion-chip" onclick="quickSend('what are some good historical dramas?')">historical dramas</div>
                <div class="suggestion-chip" onclick="quickSend('i want something lighthearted and fun')">lighthearted & fun</div>
                <div class="suggestion-chip" onclick="quickSend('where can i watch The Untamed?')">where to watch</div>
            </div>
        </div>
    </div>

    <div class="chat-input-area">
        <input
            type="text"
            id="userInput"
            placeholder="ask me anything about cdramas..."
            onkeydown="if(event.key === 'Enter') sendMessage()"
        />
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const message = input.value.trim();
            if (!message) return;

            input.value = "";
            document.getElementById("sendBtn").disabled = true;

            appendMessage(message, "user");
            const typing = appendMessage("finding your next drama...", "typing");

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                typing.remove();
                appendMessage(data.reply, "bot");

            } catch (error) {
                typing.remove();
                appendMessage("something went wrong, please try again!", "bot");
            }

            document.getElementById("sendBtn").disabled = false;
            input.focus();
        }

        function quickSend(text) {
            document.getElementById("userInput").value = text;
            sendMessage();
        }

        function appendMessage(text, type) {
            const messages = document.getElementById("chatMessages");
            const welcome = document.getElementById("welcome");
            if (welcome) welcome.remove();

            const div = document.createElement("div");
            div.classList.add("message", type);
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
